<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bindu Command Center</title>
<style>
body{background:#0b1020;color:white;font-family:sans-serif;padding:20px}
input,textarea{width:100%;margin-bottom:10px;padding:8px;background:#18223e;color:white;border:none}
button{padding:10px;background:#69a1ff;color:white;border:none;font-weight:bold;cursor:pointer}
.panel{margin-top:20px;padding:10px;border:1px solid #2a365e}
</style>
</head>
<body>

<h1>Bindu Command Center</h1>

<h3>Subject</h3>
<input id="subject" value="housing_delivery_system"/>

<h3>Request</h3>
<textarea id="request">optimise housing delivery</textarea>

<button onclick="run()">WL = FIX IT</button>

<div class="panel">
<h3>Candidate Actions</h3>
<div id="output">No run yet</div>
</div>

<script>
async function run(){
  try{
    const res = await fetch("/solve",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        subject:document.getElementById("subject").value,
        request:document.getElementById("request").value,
        purpose:"",
        constraints:[],
        legal_constraints:[],
        assumptions:[]
      })
    })
    const data = await res.json()
    document.getElementById("output").innerText = JSON.stringify(data,null,2)
  }catch(e){
    document.getElementById("output").innerText = "Error: " + e.message
  }
}
</script>

</body>
</html>
