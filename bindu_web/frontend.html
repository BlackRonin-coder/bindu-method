<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bindu Command Center</title>
  <style>
    :root {
      --bg: #06153a;
      --panel: #0c225b;
      --panel-2: #0f2c75;
      --border: #2d4ea1;
      --text: #f3f7ff;
      --muted: #b9c8ef;
      --accent: #7fb0ff;
      --button: #7fb0ff;
      --button-text: #08204f;
      --danger: #ffb4b4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #04112e 0%, #081a49 100%);
      color: var(--text);
      padding: 32px 20px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 2.25rem;
      font-weight: 800;
    }

    label {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      margin: 20px 0 10px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #12358d 0%, #0e2c77 100%);
      color: var(--text);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1.05rem;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #d4e0ff;
      opacity: 0.8;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      margin-top: 18px;
      border: 0;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(180deg, #8ebdff 0%, #72a8ff 100%);
      color: var(--button-text);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
    }

    .panel {
      margin-top: 22px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.9rem;
      font-weight: 800;
    }

    .empty {
      color: var(--muted);
      margin: 0;
      font-size: 1.05rem;
    }

    .action-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      background: rgba(6, 19, 56, 0.35);
    }

    .action-card h3 {
      margin: 0 0 12px;
      font-size: 1.2rem;
      font-weight: 800;
      color: #ffffff;
    }

    .field {
      margin: 0 0 12px;
      line-height: 1.45;
    }

    .field strong {
      color: #ffffff;
    }

    ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    li {
      margin-bottom: 6px;
    }

    .status {
      margin-top: 14px;
      font-size: 0.98rem;
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      white-space: pre-wrap;
    }

    details {
      margin-top: 18px;
    }

    summary {
      cursor: pointer;
      font-weight: 700;
      color: var(--accent);
    }

    pre {
      margin-top: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: #dbe7ff;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bindu Command Center</h1>

    <label for="subject">Subject</label>
    <input
      id="subject"
      type="text"
      value="housing_delivery_system"
      placeholder="Enter the system or subject"
    />

    <label for="request">Request</label>
    <textarea
      id="request"
      placeholder="Describe what Bindu should optimize or fix"
    >optimise housing delivery</textarea>

    <button type="button" onclick="runBindu()">WL = FIX IT</button>

    <div class="panel">
      <h2>Candidate Actions</h2>
      <div id="output">
        <p class="empty">No run yet</p>
      </div>
      <div id="status" class="status"></div>

      <details>
        <summary>Debug JSON</summary>
        <pre id="debug-output"></pre>
      </details>
    </div>
  </div>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function listOrNone(items) {
      if (!Array.isArray(items) || items.length === 0) {
        return "<p class=\"field\">None listed</p>";
      }
      return `<ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    }

    function renderCandidateActions(data) {
      const output = document.getElementById("output");
      const debug = document.getElementById("debug-output");

      if (debug) {
        debug.textContent = JSON.stringify(data, null, 2);
      }

      if (!data || !Array.isArray(data.candidate_actions) || data.candidate_actions.length === 0) {
        output.innerHTML = `<p class="empty">No candidate actions returned.</p>`;
        return;
      }

      const html = data.candidate_actions.map((action, index) => `
        <div class="action-card">
          <h3>${index + 1}. ${escapeHtml(action.name || "Unnamed action")}</h3>

          <p class="field"><strong>Description:</strong><br>${escapeHtml(action.description || "No description")}</p>

          <p class="field"><strong>Expected outcome:</strong><br>${escapeHtml(action.expected_outcome || "No expected outcome")}</p>

          <p class="field"><strong>Fallback plan:</strong><br>${escapeHtml(action.fallback_plan || "No fallback plan")}</p>

          <div class="field">
            <strong>Measurable outputs:</strong>
            ${listOrNone(action.measurable_outputs)}
          </div>

          <div class="field">
            <strong>Patches applied:</strong>
            ${listOrNone(action.patches_applied)}
          </div>
        </div>
      `).join("");

      output.innerHTML = html;
    }

    async function runBindu() {
      const subject = document.getElementById("subject").value.trim();
      const request = document.getElementById("request").value.trim();
      const output = document.getElementById("output");
      const status = document.getElementById("status");
      const debug = document.getElementById("debug-output");

      if (!subject || !request) {
        output.innerHTML = `<p class="error">Please enter both Subject and Request.</p>`;
        status.textContent = "";
        if (debug) debug.textContent = "";
        return;
      }

      output.innerHTML = `<p class="empty">Running Bindu...</p>`;
      status.textContent = "Sending request...";

      try {
        const response = await fetch("/run-bindu", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            subject,
            request,
            purpose: "",
            constraints: [],
            legal_constraints: [],
            assumptions: [],
            metadata: { command: "WL" }
          })
        });

        const text = await response.text();

        if (!response.ok) {
          output.innerHTML = `<p class="error">Server error:\n${escapeHtml(text)}</p>`;
          status.textContent = `Request failed (${response.status})`;
          if (debug) debug.textContent = text;
          return;
        }

        try {
          const data = JSON.parse(text);
          renderCandidateActions(data);
          status.textContent = "Run complete.";
        } catch (err) {
          output.innerHTML = `<p class="error">Response was not valid JSON:\n${escapeHtml(err.message)}</p>`;
          status.textContent = "Received response, but parsing failed.";
          if (debug) debug.textContent = text;
        }
      } catch (err) {
        output.innerHTML = `<p class="error">Network or server error:\n${escapeHtml(err.message)}</p>`;
        status.textContent = "Request failed before completion.";
        if (debug) debug.textContent = "";
      }
    }
  </script>
</body>
</html>
